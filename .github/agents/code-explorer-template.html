<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Explorer — <!-- SLOT:TITLE --></title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
:root {
  --bg: #1e1e2e;
  --surface: #2a2a3e;
  --surface2: #313148;
  --text: #cdd6f4;
  --muted: #a6adc8;
  --accent: #89b4fa;
  --green: #a6e3a1;
  --yellow: #f9e2af;
  --red: #f38ba8;
  --mono: 'Courier New', Courier, monospace;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; }
a { color: var(--accent); }
a:hover { text-decoration: underline; }

header { padding: 1.5rem 2rem; border-bottom: 1px solid #3a3a55; background: var(--surface); }
header h1 { font-size: 1.4rem; color: var(--accent); letter-spacing: -0.3px; }
header p { color: var(--muted); font-size: 0.88rem; margin-top: 0.2rem; }
header .file-badge { display: inline-block; background: var(--surface2); border-radius: 4px; padding: 0.1rem 0.5rem; font-family: var(--mono); font-size: 0.8rem; color: var(--yellow); margin-top: 0.3rem; }

/* Tab navigation */
.tab-nav { display: flex; padding: 0 2rem; background: var(--surface); border-bottom: 1px solid #3a3a55; flex-wrap: wrap; gap: 0; }
.tab-btn { padding: 0.75rem 1.2rem; cursor: pointer; border: none; background: none; color: var(--muted); font-size: 0.88rem; border-bottom: 2px solid transparent; transition: all 0.18s; white-space: nowrap; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* Tab panels */
.tab-panel { display: none; padding: 2rem; max-width: 1280px; margin: 0 auto; }
.tab-panel.active { display: block; }

/* Cards */
.card { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #3a3a55; }
.card h3 { color: var(--accent); margin-bottom: 0.6rem; font-size: 1rem; }

/* Two-column */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
@media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }

/* Architecture sub-tabs */
.arch-subnav { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.arch-btn { padding: 0.35rem 0.85rem; border-radius: 20px; border: 1px solid #444; background: none; color: var(--muted); cursor: pointer; font-size: 0.82rem; transition: all 0.18s; }
.arch-btn:hover { border-color: var(--accent); color: var(--text); }
.arch-btn.active { background: var(--accent); color: #1e1e2e; border-color: var(--accent); font-weight: 600; }
.arch-panel { display: none; }
.arch-panel.active { display: block; }

.diag-container { background: var(--surface2); border-radius: var(--radius); padding: 1.5rem; min-height: 280px; overflow-x: auto; display: flex; justify-content: center; align-items: flex-start; }
.diag-container svg { max-width: 100%; height: auto; }
.diag-title { color: var(--accent); font-size: 1.05rem; font-weight: 600; margin-bottom: 0.75rem; }
.diag-caption { color: var(--muted); font-size: 0.82rem; margin-top: 0.75rem; font-style: italic; border-left: 2px solid #444; padding-left: 0.6rem; }

/* Patterns */
.pattern-card { background: var(--surface2); border-radius: var(--radius); padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #3a3a55; }
.pattern-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.pattern-icon { font-size: 1.1rem; }
.pattern-title { font-weight: 600; color: var(--text); font-size: 0.95rem; }
.pattern-desc { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.75rem; }
.pattern-layers { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.6rem; }
.layer { font-size: 0.8rem; padding: 0.28rem 0.6rem; border-radius: 4px; line-height: 1.4; }
.layer-basics   { background: #1e3a2a; color: #a6e3a1; }
.layer-eng      { background: #3a2e1a; color: #f9e2af; }
.layer-arch     { background: #1a2a3e; color: #89b4fa; }
.layer-label    { font-weight: 700; margin-right: 0.35rem; }
.ext-link       { display: inline-block; font-size: 0.8rem; color: var(--accent); text-decoration: none; margin-top: 0.2rem; }
.ext-link:hover { text-decoration: underline; }
.fix-hint       { background: #1e1e2e; border-left: 3px solid var(--yellow); padding: 0.4rem 0.7rem; border-radius: 0 4px 4px 0; font-size: 0.8rem; color: var(--text); margin-top: 0.5rem; }
code { font-family: var(--mono); font-size: 0.85em; background: #12121e; padding: 0.05em 0.3em; border-radius: 3px; color: var(--yellow); }

/* Badges */
.badge { display: inline-block; padding: 0.18rem 0.55rem; border-radius: 12px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.3px; }
.badge-high   { background: #4a1a2a; color: var(--red); }
.badge-medium { background: #3e2e10; color: var(--yellow); }
.badge-low    { background: #1a3220; color: var(--green); }
.badge-score  { background: var(--surface2); color: var(--accent); font-size: 1rem; font-weight: 700; padding: 0.3rem 0.8rem; border: 1px solid var(--accent); border-radius: var(--radius); }

/* Type Hints */
.type-banner { display: flex; align-items: center; gap: 1.2rem; padding: 1.1rem 1.5rem; background: var(--surface2); border-radius: var(--radius); margin-bottom: 1.5rem; border: 1px solid #3a3a55; }
.score-big { font-size: 2.2rem; font-weight: 800; color: var(--accent); line-height: 1; }
.score-verdict { color: var(--muted); font-size: 0.88rem; }

/* Code Review */
.review-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 1.5rem; }
@media (max-width: 800px) { .review-layout { grid-template-columns: 1fr; } }
.review-left { background: var(--surface); border-radius: var(--radius); padding: 1.1rem; border: 1px solid #3a3a55; }
.review-right { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; border: 1px solid #3a3a55; min-height: 320px; }
.review-item { padding: 0.7rem 0.8rem; border-radius: 6px; cursor: pointer; margin-bottom: 0.5rem; border: 1px solid transparent; transition: all 0.15s; }
.review-item:hover { border-color: #444; background: var(--surface2); }
.review-item.selected { border-color: var(--accent); background: var(--surface2); }
.ri-titlerow { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
.ri-title { font-size: 0.88rem; font-weight: 600; color: var(--text); }
.ri-note { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
pre.snippet { background: #12121e; border-radius: 5px; padding: 0.7rem; font-size: 0.76rem; overflow-x: auto; color: #cdd6f4; font-family: var(--mono); margin: 0.6rem 0; line-height: 1.5; border: 1px solid #2a2a3e; }
.detail-head { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.9rem; }
.detail-title { color: var(--accent); font-size: 1rem; font-weight: 700; }
.detail-body { color: var(--muted); font-size: 0.86rem; line-height: 1.65; margin-bottom: 0.9rem; }
.hint-box { background: var(--surface2); border-left: 3px solid var(--accent); padding: 0.6rem 0.8rem; border-radius: 0 4px 4px 0; font-size: 0.84rem; color: var(--text); }

/* Performance */
.perf-card { background: var(--surface2); border-radius: var(--radius); padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #3a3a55; }
.perf-title { font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
.perf-desc { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.5rem; }

/* Next Steps */
.ns-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem 1.2rem; background: var(--surface2); border-radius: var(--radius); margin-bottom: 0.8rem; border: 1px solid #3a3a55; }
.ns-num { font-size: 1.4rem; font-weight: 800; color: var(--accent); min-width: 2rem; line-height: 1.2; }
.ns-text a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.95rem; }
.ns-text a:hover { text-decoration: underline; }
.ns-desc { color: var(--muted); font-size: 0.83rem; margin-top: 0.2rem; }

/* Fallback */
.fallback { background: #2a1215; color: var(--red); padding: 1rem; border-radius: 6px; font-size: 0.72rem; font-family: var(--mono); overflow-x: auto; white-space: pre-wrap; }

/* Section headings */
.section-head { font-size: 1.05rem; font-weight: 700; margin-bottom: 1rem; }
.section-head.green { color: var(--green); }
.section-head.yellow { color: var(--yellow); }
.section-head.red { color: var(--red); }
</style>
</head>
<body>

<header>
  <h1>Code Explorer</h1>
  <span class="file-badge"><!-- SLOT:FILE_BADGE --></span>
  <p style="margin-top:0.4rem;"><!-- SLOT:HEADER_META --></p>
</header>

<nav class="tab-nav">
<!-- SLOT:TAB_BUTTONS -->
</nav>

<!-- SLOT:TAB_PANELS -->

<script>
// ── Tab switching ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Architecture sub-tabs ──
function switchArch(name, btn) {
  document.querySelectorAll('.arch-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.arch-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('arch-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Code Review ──
const reviewItems = [
/* SLOT:REVIEW_ITEMS */
];

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectReview(id) {
  document.querySelectorAll('.review-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('ri-' + id).classList.add('selected');
  const item = reviewItems[id];
  const sevClass = 'badge-' + item.severity;
  const body = item.fullExplanation.replace(/\n/g, '<br>');
  document.getElementById('review-detail-panel').innerHTML = `
    <div>
      <div class="detail-head">
        <span class="detail-title">${escH(item.title)}</span>
        <span class="badge ${escH(sevClass)}">${escH(item.severity)}</span>
      </div>
      <div class="detail-body">${body}</div>
      <pre class="snippet">${escH(item.snippet)}</pre>
      <div class="hint-box">&#128161; <strong>Improvement:</strong> ${escH(item.improvementHint)}</div>
    </div>`;
}

// ── Mermaid ──
mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

const diagrams = {
/* SLOT:DIAGRAMS_MAP */
};

let renderCounter = 0;

async function renderDiagram(key, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const source = diagrams[key];
  if (!source) { container.innerHTML = '<p style="color:var(--muted)">No diagram source found.</p>'; return; }
  const uid = 'mmd-' + key + '-' + (++renderCounter);
  try {
    const { svg, bindFunctions } = await mermaid.render(uid, source);
    container.innerHTML = svg;
    if (typeof bindFunctions === 'function') bindFunctions(container);
  } catch (err) {
    container.innerHTML = '<pre class="fallback">Render failed: ' + err.message + '\n\nSource:\n' + source + '</pre>';
  }
}

async function renderAll() {
  for (const [key] of Object.entries(diagrams)) {
    await renderDiagram(key, 'diag-' + key);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  selectReview(0);
  renderAll();
});
</script>
</body>
</html>
